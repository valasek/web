{{ $block := .wcBlock }}
{{ $content := $block.content }}

<section class="py-16 bg-transparent">
  <div class="container mx-auto px-4 max-w-4xl">
    
    {{ with $content.title }}
      <h2 class="text-3xl md:text-4xl font-bold text-center text-gray-900 dark:text-white mb-6">{{ . }}</h2>
    {{ end }}

    {{ with $content.text }}
      <p class="text-lg text-center text-gray-600 dark:text-gray-300 mb-8 leading-relaxed">{{ . }}</p>
    {{ end }}

    {{ if $content.link }}
      <div class="flex justify-center">
        <a href="{{ $content.link }}" class="inline-block px-8 py-3 bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white font-medium rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
          {{ $content.name | default "Zistiť viac" }}
        </a>
      </div>
    {{ end }}

  </div>
</section>
