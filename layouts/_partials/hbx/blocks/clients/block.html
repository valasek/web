{{ $block := .wcBlock }}
{{ $content := $block.content }}

<section class="py-8 bg-transparent">
  <div class="container mx-auto px-4">
    
    {{ with $content.title }}
      <h2 class="text-3xl font-bold text-center text-gray-900 dark:text-white mb-12">{{ . }}</h2>
    {{ end }}

    <div class="flex flex-wrap items-center justify-center gap-12 md:gap-16">
      {{ range $content.items }}
        <div class="flex flex-col items-center px-6 py-4">
          {{ $image := resources.Get (printf "media/logos/%s" .logo) }}
          {{ if $image }}
              <img src="{{ $image.RelPermalink }}" alt="{{ .name }}" class="h-12 w-auto object-contain dark:brightness-0 dark:invert">
          {{ else }}
            <span class="text-gray-900 dark:text-white font-medium">{{ .name }}</span>
            <span class="text-xs text-gray-500">Missing: {{ .logo }}</span>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </div>
</section>
