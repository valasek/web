role: Sprievodca & kouč, kariérny mentor a mentor manažérov
bio: >
  Moja vášeň spočíva v sprevádzaní ľudí. Ako sprievodca, hlavne formou koučingu, mentoringu alebo práce s telom sprevádzam manažérov a lídrov na ich ceste k osobnému a profesionálnemu rastu. Pomáham agilným a IT delivery tímom nájsť ich optimálne fungovanie.
  <br><br>
  Momentálne pôsobím ako Delivery Manager v spoločnosti Siemens Healthineers, kde vediem tím zodpovedný za vývoj cloudovej platformy na trénovanie medicínskych AI modelov využívajúcich edge computing.
  <br><br>
  Popri tom som tvorcom softvérových nástrojov <a href="https://findacoach.eu/">Find a Coach</a> a <a href="https://kicoma.stanislavvalasek.com/">KiCoMa</a>. Find a Coach pomáha prepájať koučovaciu komunitu. Oba projekty mi umožňujú zostať v kontakte s najnovšími technológiami a aplikovať moju dlhoročnú technickú expertízu.
